<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>情報メニューぷ！</title>
　<link rel="stylesheet" href="/css/style.css">
　<link rel="stylesheet" href="/css/menu.css"> 
</head>

<body>
  <div class="container">

    <!-- 共通メニュー -->
    <div id="menu-container"></div>
<script>
  fetch("/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;
    });
</script>

<!-- ★ 夜モードスクリぷト -->
<script>
  document.addEventListener("click", (e) => {
    if (e.target.id === "darkmode-toggle") {
      document.body.classList.toggle("darkmode");

      // ボタンの表示切り替え
      if (document.body.classList.contains("darkmode")) {
        e.target.textContent = "☀️ 昼モード";
      } else {
        e.target.textContent = "🌙 夜モード";
      }
    }
  });
</script>

    <h1 class="highlight-black">📚 メニューぷ！</h1>
    <p>気になる情報を選んでねぷ！</p>

    <div class="menu-list">

      <a class="menu-button" href="/coupon.html">🎁 クーポンまとめ</a>

      <a class="menu-button" href="/jepiros/index.html">🔥 ジェピロス狩場まとめ</a>

      <a class="menu-button" href="/guild-info.html">🏰 ギルド情報まとめ</a>

      <a class="menu-button" href="/beginner.html">🐾 初心者さん向けガイド</a>

    </div>

  </div>
</body>
</html>
