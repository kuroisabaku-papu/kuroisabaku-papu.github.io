<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>アプデ情報まとめ - 神聖パプー帝国</title>
　<link rel="stylesheet" href="/css/style.css">
　<link rel="stylesheet" href="/css/menu.css"> 
</head>

<body>
  <div class="container">

    <!-- 共通メニュー -->
    <div id="menu-container"></div>
<script>
  fetch("/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;
    });
</script>

<!-- ★ 夜モードスクリぷト -->
<script>
  // ページ読み込み時に夜モードを復元
  if (localStorage.getItem("darkmode") === "on") {
    document.body.classList.add("darkmode");
  }

  document.addEventListener("click", (e) => {
    if (e.target.id === "darkmode-toggle") {
      document.body.classList.toggle("darkmode");

      // 状態を保存
      if (document.body.classList.contains("darkmode")) {
        localStorage.setItem("darkmode", "on");
        e.target.textContent = "☀️ 昼モード";
      } else {
        localStorage.setItem("darkmode", "off");
        e.target.textContent = "🌙 夜モード";
      }
    }
  });
</script>

    <h1 class="highlight-black">アプデ情報まとめぷ</h1>

    <p>ここでは、黒い砂漠のアップデート情報をまとめていくぷ。</p>

  <h2>📘 記事一覧</h2>
    <div id="updates-container"></div>
    <div id="pagination" class="pagination"></div>
    <script>
fetch("/data/updates.json")
  .then(res => res.json())
  .then(updates => {

    const params = new URLSearchParams(window.location.search);
    const page = parseInt(params.get("page") || "1");
    const perPage = 10;

    const start = (page - 1) * perPage;
    const end = start + perPage;

    const pageItems = updates.slice(start, end);

    const container = document.getElementById("updates-container");
    container.innerHTML = "";

    pageItems.forEach(item => {
      container.innerHTML += `
      <div class="update-item">
        <a href="${item.link}">${item.title}</a> 
      </div>
    `;
  });
    
    // ページ番号生成
    const totalPages = Math.ceil(updates.length / perPage);
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    for (let i = 1; i <= totalPages; i++) {
      const active = i === page ? "active" : "";
      pagination.innerHTML += `
        <a class="${active}" href="?page=${i}">${i}</a>
      `;
    }
  });
</script>
  </div>
</body>
</html>
