<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>クーポンコードまとめ - 神聖パプー帝国</title>
　<link rel="stylesheet" href="/css/style.css">
　<link rel="stylesheet" href="/css/menu.css"> 
</head>

<body>
  <div class="container">

    <!-- 共通メニュー -->
    <div id="menu-container"></div>
<script>
  fetch("/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;
    });
</script>

<!-- ★ 夜モードスクリぷト -->
<script>
  document.addEventListener("click", (e) => {
    if (e.target.id === "darkmode-toggle") {
      document.body.classList.toggle("darkmode");

      // ボタンの表示切り替え
      if (document.body.classList.contains("darkmode")) {
        e.target.textContent = "☀️ 昼モード";
      } else {
        e.target.textContent = "🌙 夜モード";
      }
    }
  });
</script>

    <h1 class="highlight-black">🎁 クーポンコードまとめぷ！</h1>

    <p>黒い砂漠で使える最新のクーポンコードをまとめたぷ！</p>

    <div class="code-box">
      <p>例）<strong>BDO-NEW-PLAYER-2026</strong></p>
    </div>

    <p>※コードは期間限定のことが多いぷ。<br>
    ※最新のコードが出たら随時更新するぷ！</p>

  </div>
</body>
</html>
