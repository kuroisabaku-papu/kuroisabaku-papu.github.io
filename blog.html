<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ブログ - 神聖パプー帝国</title>
　<link rel="stylesheet" href="/css/style.css">
　<link rel="stylesheet" href="/css/menu.css"> 
</head>

<body>
  <div class="container">

    <!-- 共通メニュー -->
  <div id="menu-container"></div>
<script>
  fetch("/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;
    });
</script>

<!-- ★ 夜モードスクリぷト -->
<script>
  document.addEventListener("click", (e) => {
    if (e.target.id === "darkmode-toggle") {
      document.body.classList.toggle("darkmode");

      // ボタンの表示切り替え
      if (document.body.classList.contains("darkmode")) {
        e.target.textContent = "☀️ 昼モード";
      } else {
        e.target.textContent = "🌙 夜モード";
      }
    }
  });
</script>

    <h1 class="highlight-black">ブログ</h1>

</body>
</html>
