<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ブログ - 神聖パプー帝国</title>
  <link rel="stylesheet" href="css/menu.css">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background:
        linear-gradient(#AEE6F880, #DFF5D280),
        url("images/paputakusan1.png") no-repeat center center fixed;
      background-size: cover;
      font-family: "Rounded Mplus 1c", sans-serif;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .menu {
      background: #AEE6F8;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }

    .menu a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .menu a:hover {
      text-decoration: underline;
    }

    h1 {
      background: #AEE6F8;
      padding: 15px;
      border-radius: 12px;
      border-bottom: 5px solid #DFF5D2;
      text-align: center;
    }

    .article-list li {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="menu-container"></div>
<script>
  fetch("/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;
    });
</script>

    <h1>ブログ</h1>

    <p>ギルドの活動記録やスクショ日記をまとめていくぷ。</p>

    <h2>📘 記事一覧</h2>
    <ul class="article-list">
      <li>（まだ記事がありませんぷ。あとで追加していくぷ！）</li>
    </ul>

    
  </div>
</body>
</html>
