<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>メニュー - 神聖パプー帝国</title>
　  <!-- 共通メニューCSSぷ-->
  <link rel="stylesheet" href="css/menu.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background:
        linear-gradient(#AEE6F880, #DFF5D280),
        url("images/paputakusan1.png") no-repeat center center fixed;
      background-size: cover;
      font-family: "Rounded Mplus 1c", sans-serif;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .menu {
      background: #AEE6F8;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }

    .menu a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .menu a:hover {
      text-decoration: underline;
    }

    h1 {
      background: #AEE6F8;
      padding: 15px;
      border-radius: 12px;
      border-bottom: 5px solid #DFF5D2;
      text-align: center;
    }

    /* 貴様見ているぷね？ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
      text-decoration: none;
      color: #333;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="menu-container"></div>

    <script>
      fetch("menu.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("menu-container").innerHTML = html;
        });
    </script>
