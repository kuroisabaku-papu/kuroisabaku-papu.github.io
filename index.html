<!-- ★ 夜モードスクリぷト -->
<script>
  // ページ読み込み時に夜モードを復元
  if (localStorage.getItem("darkmode") === "on") {
    document.body.classList.add("darkmode");
  }

  document.addEventListener("click", (e) => {
    if (e.target.id === "darkmode-toggle") {
      document.body.classList.toggle("darkmode");

      // 状態を保存
      if (document.body.classList.contains("darkmode")) {
        localStorage.setItem("darkmode", "on");
        e.target.textContent = "☀️ 昼モード";
      } else {
        localStorage.setItem("darkmode", "off");
        e.target.textContent = "🌙 夜モード";
      }
    }
  });
</script>

<!-- イベントカレンダーぷ -->
<h2 class="highlight-black">イベントカレンダー</h2>
<div id="events-container"></div>

<script>
fetch("/data/events.json")
  .then(res => res.json())
  .then(events => {
    const container = document.getElementById("events-container");

    events.forEach(ev => {
      const bar = `
        <div class="event-bar">
          <div class="event-title">${ev.title}</div>
          <div class="event-range">${ev.start} 〜 ${ev.end}</div>
          <a class="event-link" href="${ev.link}" target="_blank"></a>
        </div>
      `;
      container.innerHTML += bar;
    });
  });
</script>
