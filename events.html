<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>イベント一覧 - 神聖パプー帝国</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/menu.css">
</head>

<body>
  <div class="container">

    <!-- 共通メニュー -->
    <div id="menu-container"></div>
<script>
  fetch("/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;
    });
</script>

<!-- ★ 夜モードスクリぷト -->
<script>
  // ページ読み込み時に夜モードを復元
  if (localStorage.getItem("darkmode") === "on") {
    document.body.classList.add("darkmode");
  }

  document.addEventListener("click", (e) => {
    if (e.target.id === "darkmode-toggle") {
      document.body.classList.toggle("darkmode");

      // 状態を保存
      if (document.body.classList.contains("darkmode")) {
        localStorage.setItem("darkmode", "on");
        e.target.textContent = "☀️ 昼モード";
      } else {
        localStorage.setItem("darkmode", "off");
        e.target.textContent = "🌙 夜モード";
      }
    }
  });
</script>

    <h1 class="highlight-black">イベント一覧</h1>
    <p class="highlight-white">現在開催中のイベントをまとめたぷ。</p>

    <div id="events-container"></div>

  </div>

  <!-- イベント読み込み -->
  <script>
    fetch("/data/events.json")
      .then(res => res.json())
      .then(events => {
        const container = document.getElementById("events-container");

events.forEach(ev => {
  const bar = `
    <div class="event-bar ${ev.type}">
      <div>
        <div class="event-title">${ev.title}</div>
        <div class="event-range">${ev.start} 〜 ${ev.end}</div>
      </div>

      <a class="event-link" href="${ev.link}" target="_blank"></a>
    </div>
  `;
  container.innerHTML += bar;
});
  });
  </script>

</body>
</html>
